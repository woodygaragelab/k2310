AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: K2310 Calendar API

Parameters:
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token (repo scope)
  GitHubRepo:
    Type: String
    Description: GitHub repository URL (e.g. https://github.com/owner/k2310)
  GitBranch:
    Type: String
    Default: main
    Description: Branch to deploy

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref ReservationsTable
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:
  ReservationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: K2310Reservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  ReservationsTablePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:Scan
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
            Resource: !GetAtt ReservationsTable.Arn

  GetReservationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/getReservations.handler
      Policies:
        - !Ref ReservationsTablePolicy
      Events:
        GetReservations:
          Type: Api
          Properties:
            Path: /reservations
            Method: get

  CreateReservationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/createReservation.handler
      Policies:
        - !Ref ReservationsTablePolicy
      Events:
        CreateReservation:
          Type: Api
          Properties:
            Path: /reservations
            Method: post

  UpdateReservationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/updateReservation.handler
      Policies:
        - !Ref ReservationsTablePolicy
      Events:
        UpdateReservation:
          Type: Api
          Properties:
            Path: /reservations/{id}
            Method: put

  DeleteReservationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/deleteReservation.handler
      Policies:
        - !Ref ReservationsTablePolicy
      Events:
        DeleteReservation:
          Type: Api
          Properties:
            Path: /reservations/{id}
            Method: delete

  FrontendApp:
    Type: AWS::Amplify::App
    Properties:
      Name: k2310-frontend
      Repository: !Ref GitHubRepo
      AccessToken: !Ref GitHubToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - cd frontend && npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: frontend/dist
            files:
              - '**/*'
          cache:
            paths:
              - frontend/node_modules/**/*
      EnvironmentVariables:
        - Name: VITE_API_URL
          Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'

  FrontendBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt FrontendApp.AppId
      BranchName: !Ref GitBranch
      EnableAutoBuild: true

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  TableName:
    Description: DynamoDB table name
    Value: !Ref ReservationsTable
  FrontendUrl:
    Description: Amplify app URL
    Value: !Sub 'https://${GitBranch}.${FrontendApp.DefaultDomain}'
